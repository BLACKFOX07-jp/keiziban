<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Board</title>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        html,body{ width:100%; height:100%; overflow:hidden; background:#111; color:white; }
        body{ display:flex; flex-direction:column; }

        header{
            height:60px; background:#1c1c1c; border-bottom:1px solid #333;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 15px; flex-shrink:0;
        }
        header h2{ font-size:18px; }

        #chat{ flex:1; overflow-y:auto; padding:12px; -webkit-overflow-scrolling:touch; }

        .message{ background:#1b1b1b; border:1px solid #2a2a2a; border-radius:14px; padding:12px; margin-bottom:10px; }
        .name{ color:#4da6ff; font-size:14px; font-weight:bold; margin-bottom:6px; }
        .text{ font-size:16px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }

        .bottom{ background:#1c1c1c; border-top:1px solid #333; padding:10px; display:flex; gap:10px; flex-shrink:0; }
        input{ flex:1; background:#222; border:1px solid #333; color:white; border-radius:12px; padding:14px; font-size:16px; outline:none; }
        button{ background:#4da6ff; color:white; border:none; border-radius:12px; padding:14px 16px; font-size:15px; flex-shrink:0; }

        /* =====================
          【修正】横画面警告の条件
          スマホ（最大幅767px以下）かつ 横向き の時だけ表示
        ===================== */
        @media screen and (max-width: 767px) and (orientation: landscape) {
            body::before{
                content:"縦画面で使ってください"; position:fixed; inset:0; background:#111;
                color:white; display:flex; align-items:center; justify-content:center;
                font-size:22px; z-index:9999;
            }
        }
    </style>
</head>
<body>

<header>
    <h2>Simple Board</h2>
    <button id="changeName">名前変更</button>
</header>

<div id="chat"></div>

<div class="bottom">
    <input id="input" type="text" maxlength="300" placeholder="文字を入力..." autocomplete="off">
    <button id="send">送信</button>
</div>

<script>
    let nickname = localStorage.getItem("nickname");
    if (!nickname) {
        nickname = prompt("ニックネームを入力してください");
        if (!nickname || nickname.trim() === "") nickname = "名無し";
        localStorage.setItem("nickname", nickname);
    }

    document.getElementById("changeName").onclick = () => {
        const newName = prompt("新しい名前を入力してください");
        if (newName && newName.trim() !== "") {
            nickname = newName;
            localStorage.setItem("nickname", nickname);
        }
    };

    // WebSocket接続 (IPアドレスは適宜書き換えてください)
    const socket = new WebSocket("ws://192.168.10.108:3000");

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const send = document.getElementById("send");

    socket.onopen = () => console.log("接続成功");
    socket.onerror = () => {
        alert("サーバーに接続できませんでした。");
    };

    socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === "history") {
            chat.innerHTML = "";
            msg.data.forEach(addMessage);
        }
        if (msg.type === "chat") {
            addMessage(msg.data);
        }
    };

    function sendMessage(){
        const text = input.value.trim();
        if (!text) return;

        socket.send(JSON.stringify({
            type: "chat",
            nickname: nickname,
            text: text
        }));
        input.value = "";
    }

    send.onclick = sendMessage;

    input.addEventListener("keydown", (e) => {
        if (e.isComposing || e.keyCode === 229) return;
        if (e.key === "Enter") sendMessage();
    });

    function addMessage(data){
        const div = document.createElement("div");
        div.className = "message";
        div.innerHTML = `
            <div class="name">${escapeHTML(data.nickname)}</div>
            <div class="text">${escapeHTML(data.text)}</div>
        `;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function escapeHTML(str){
        return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    }
</script>

</body>
</html>
