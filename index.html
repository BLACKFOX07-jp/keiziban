<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Board</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#111;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  padding:15px;
  background:#1c1c1c;
  border-bottom:1px solid #333;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.message{
  border-bottom:1px solid #222;
  padding-bottom:12px;
  margin-bottom:12px;
}

.name{
  color:#4da6ff;
  font-weight:bold;
  margin-bottom:5px;
}

.text{
  line-height:1.5;
  word-break:break-word;
}

.bottom{
  display:flex;
  gap:10px;
  padding:12px;
  background:#1c1c1c;
  border-top:1px solid #333;
}

input{
  flex:1;
  padding:12px;
  background:#222;
  border:1px solid #333;
  border-radius:8px;
  color:white;
  outline:none;
}

button{
  background:#4da6ff;
  border:none;
  color:white;
  padding:12px 16px;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>
<body>

<header>

<h2>Simple Board</h2>

<button id="changeName">
名前変更
</button>

</header>

<div id="chat"></div>

<div class="bottom">

<input
  id="input"
  type="text"
  maxlength="300"
  placeholder="文字を入力..."
  autocomplete="off"
>

<button id="send">
送信
</button>

</div>

<script>

// =====================
// ニックネーム
// =====================

let nickname = localStorage.getItem("nickname");

if (!nickname) {

  nickname = prompt("ニックネーム");

  if (!nickname || nickname.trim() === "") {

    nickname = "名無し";
  }

  localStorage.setItem("nickname", nickname);
}

// 名前変更
document.getElementById("changeName").onclick = () => {

  const newName = prompt("新しい名前");

  if (newName && newName.trim() !== "") {

    nickname = newName;

    localStorage.setItem("nickname", nickname);
  }
};

// =====================
// WebSocket接続
// =====================

// ↓↓↓ここを自分のPCのIPに変える↓↓↓

const socket = new WebSocket(
  "ws://192.168.1.8:3000"
);

// =====================
// 要素
// =====================

const chat = document.getElementById("chat");

const input = document.getElementById("input");

const send = document.getElementById("send");

// =====================
// メッセージ受信
// =====================

socket.onmessage = (event) => {

  const msg = JSON.parse(event.data);

  // 履歴
  if (msg.type === "history") {

    msg.data.forEach(addMessage);
  }

  // 新規
  if (msg.type === "chat") {

    addMessage(msg.data);
  }
};

// =====================
// 投稿
// =====================

send.onclick = () => {

  const text = input.value.trim();

  if (!text) return;

  socket.send(JSON.stringify({
    type: "chat",
    nickname,
    text
  }));

  input.value = "";
};

// Enter送信
input.addEventListener("keydown", (e) => {

  if (e.key === "Enter") {

    send.click();
  }
});

// =====================
// 表示
// =====================

function addMessage(data) {

  const div = document.createElement("div");

  div.className = "message";

  div.innerHTML = `
    <div class="name">
      ${escapeHTML(data.nickname)}
    </div>

    <div class="text">
      ${escapeHTML(data.text)}
    </div>
  `;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}

// =====================
// XSS対策
// =====================

function escapeHTML(str) {

  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

</script>

</body>
</html>
