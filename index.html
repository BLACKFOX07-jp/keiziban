<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Board</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#111;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* =====================
  ヘッダー
===================== */

header{
  padding:15px;
  background:#1c1c1c;
  border-bottom:1px solid #333;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h2{
  font-size:18px;
}

/* =====================
  チャット欄
===================== */

#chat{
  flex:1;
  overflow-y:auto;
  padding:12px;
}

/* =====================
  メッセージ
===================== */

.message{
  background:#1b1b1b;
  border:1px solid #2a2a2a;
  border-radius:12px;

  padding:12px;
  margin-bottom:10px;
}

.name{
  color:#4da6ff;
  font-weight:bold;
  margin-bottom:6px;
  font-size:14px;
}

.text{
  line-height:1.6;
  font-size:16px;

  white-space:pre-wrap;
  word-break:break-word;
}

/* =====================
  下部入力欄
===================== */

.bottom{
  display:flex;
  gap:10px;

  padding:10px;

  background:#1c1c1c;
  border-top:1px solid #333;
}

input{
  flex:1;

  padding:14px;

  background:#222;
  border:1px solid #333;
  border-radius:10px;

  color:white;
  font-size:16px;

  outline:none;
}

button{
  background:#4da6ff;

  border:none;

  color:white;

  padding:14px 18px;

  border-radius:10px;

  cursor:pointer;

  font-size:15px;
}

/* =====================
  スマホ最適化
===================== */

@media(max-width:600px){

  header{
    padding:12px;
  }

  header h2{
    font-size:16px;
  }

  .message{
    padding:10px;
  }

  .text{
    font-size:15px;
  }

  input{
    font-size:16px;
  }

  button{
    padding:14px;
  }
}

</style>
</head>
<body>

<header>

<h2>Simple Board</h2>

<button id="changeName">
名前変更
</button>

</header>

<div id="chat"></div>

<div class="bottom">

<input
  id="input"
  type="text"
  maxlength="300"
  placeholder="文字を入力..."
  autocomplete="off"
>

<button id="send">
送信
</button>

</div>

<script>

// =====================
// ニックネーム
// =====================

let nickname = localStorage.getItem("nickname");

if (!nickname) {

  nickname = prompt("ニックネーム");

  if (!nickname || nickname.trim() === "") {

    nickname = "名無し";
  }

  localStorage.setItem("nickname", nickname);
}

// =====================
// 名前変更
// =====================

document.getElementById("changeName").onclick = () => {

  const newName = prompt("新しい名前");

  if (newName && newName.trim() !== "") {

    nickname = newName;

    localStorage.setItem("nickname", nickname);
  }
};

// =====================
// WebSocket接続
// =====================

// 自分のPCのIPに変更

const socket = new WebSocket(
  "ws://192.168.10.108:3000"
);

// =====================
// 要素
// =====================

const chat = document.getElementById("chat");

const input = document.getElementById("input");

const send = document.getElementById("send");

// =====================
// 接続確認
// =====================

socket.onopen = () => {

  console.log("接続成功");
};

socket.onerror = (err) => {

  console.log("接続失敗", err);

  alert("サーバー接続失敗");
};

// =====================
// メッセージ受信
// =====================

socket.onmessage = (event) => {

  const msg = JSON.parse(event.data);

  // 履歴
  if (msg.type === "history") {

    chat.innerHTML = "";

    msg.data.forEach(addMessage);
  }

  // 新規
  if (msg.type === "chat") {

    addMessage(msg.data);
  }
};

// =====================
// 投稿
// =====================

function sendMessage(){

  const text = input.value.trim();

  if (!text) return;

  socket.send(JSON.stringify({
    type: "chat",
    nickname,
    text
  }));

  input.value = "";
}

send.onclick = sendMessage;

// Enter送信

input.addEventListener("keydown", (e) => {

  if (e.key === "Enter") {

    sendMessage();
  }
});

// =====================
// 表示
// =====================

function addMessage(data) {

  const div = document.createElement("div");

  div.className = "message";

  div.innerHTML = `
    <div class="name">
      ${escapeHTML(data.nickname)}
    </div>

    <div class="text">
      ${escapeHTML(data.text)}
    </div>
  `;

  chat.appendChild(div);

  // 一番下へ
  chat.scrollTop = chat.scrollHeight;
}

// =====================
// XSS対策
// =====================

function escapeHTML(str) {

  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

</script>

</body>
</html>
